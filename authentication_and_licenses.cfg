#############################################################################

# Trusted Registry Username
#
# The username of the SCC account with access to the SUSE Trusted Registry.
#
export SUSE_TRUSTED_REGISTRY_USERNAME=


# Trusted Registry Password
#
# The password for the user account.
#
export SUSE_TRUSTED_REGISTRY_PASSWORD=


